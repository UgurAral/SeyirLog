<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a8f"/>
      <stop offset="100%" stop-color="#0a1540"/>
    </linearGradient>
    <linearGradient id="ring_g" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="wheel_g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a7a"/>
      <stop offset="100%" stop-color="#0d1f52"/>
    </linearGradient>
    <clipPath id="rc"><rect width="1024" height="1024" rx="200"/></clipPath>
  </defs>

  <!-- Arka plan -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <!-- Hafif glow merkez -->
  <circle cx="512" cy="512" r="440" fill="#1e4fc2" opacity="0.10" clip-path="url(#rc)"/>

  <!-- ── DIŞ MAVİ HALKA ─────────────────────────────────── -->
  <circle cx="512" cy="512" r="380" fill="url(#ring_g)"/>
  <circle cx="512" cy="512" r="300" fill="#0d1f52"/>

  <!-- ── DİREKSİYON SİMİDİ ─────────────────────────────── -->
  <circle cx="512" cy="512" r="265" fill="url(#wheel_g)"/>
  <circle cx="512" cy="512" r="185" fill="#0d1f52"/>

  <!-- 3 Kol (0°=üst, 120°, 240°) -->
  <rect x="494" y="252" width="36" height="176" rx="18" fill="#1e3a7a"/>
  <rect x="494" y="252" width="36" height="176" rx="18" fill="#1e3a7a"
        transform="rotate(120,512,512)"/>
  <rect x="494" y="252" width="36" height="176" rx="18" fill="#1e3a7a"
        transform="rotate(240,512,512)"/>

  <!-- Merkez göbek -->
  <circle cx="512" cy="512" r="80"  fill="#1a3270"/>
  <circle cx="512" cy="512" r="60"  fill="#0d1f52"/>

  <!-- ── SL HARFLERİ ────────────────────────────────────── -->
  <!-- S — cyan/turkuaz -->
  <text x="490" y="544"
    font-family="DejaVu Sans, Arial Black, sans-serif"
    font-weight="900" font-size="72"
    fill="#22d3ee" text-anchor="middle">S</text>
  <!-- L — turuncu/altın -->
  <text x="538" y="544"
    font-family="DejaVu Sans, Arial Black, sans-serif"
    font-weight="900" font-size="72"
    fill="#f59e0b" text-anchor="middle">L</text>

  <!-- ── DÖNEN OK (sağ üst, saat yönünde) ──────────────── -->
  <!-- Yay: r=380, saat 11'den saat 2'ye yaklaşık 100° -->
  <!-- 11 saat = 300°, 2 saat = 60° -->
  <!-- SVG arc: başlangıç=300°, bitiş=60° saat yönü -->
  <!-- x=512+380*cos(300°)=512+190=702, y=512+380*sin(300°)=512-329=183 -->
  <!-- x=512+380*cos(60°)=512+190=702, y=512+380*sin(60°)=512+329=841 -->
  <!-- Daha basit: sağ üstten sağ alta 120° yay -->
  <path d="M 718 200 A 380 380 0 0 1 858 640"
        fill="none"
        stroke="#38bdf8"
        stroke-width="44"
        stroke-linecap="round"
        opacity="0.95"/>
  <!-- Ok başı (sağ alt yönünde) -->
  <polygon
    points="0,-28 24,20 -24,20"
    fill="#38bdf8"
    transform="translate(858,640) rotate(148)"/>

</svg>
