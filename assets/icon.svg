<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0d1f5c"/>
    </linearGradient>
    <clipPath id="rc"><rect width="1024" height="1024" rx="200"/></clipPath>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="430" fill="#2952b3" opacity="0.12" clip-path="url(#rc)"/>

  <!-- Ana daire zemin -->
  <circle cx="512" cy="512" r="400" fill="#0f2060"/>
  <circle cx="512" cy="512" r="400" fill="none" stroke="#1e4fc0" stroke-width="5"/>

  <!-- Direksiyon dış halkası -->
  <circle cx="512" cy="512" r="268" fill="none" stroke="#2563eb" stroke-width="48"/>

  <!-- 3 kol -->
  <line x1="512" y1="248" x2="512" y2="384"
        stroke="#2563eb" stroke-width="42" stroke-linecap="round"/>
  <line x1="512" y1="248" x2="512" y2="384"
        stroke="#2563eb" stroke-width="42" stroke-linecap="round"
        transform="rotate(120,512,512)"/>
  <line x1="512" y1="248" x2="512" y2="384"
        stroke="#2563eb" stroke-width="42" stroke-linecap="round"
        transform="rotate(240,512,512)"/>

  <!-- Merkez göbek -->
  <circle cx="512" cy="512" r="96"  fill="#0f2060"/>
  <circle cx="512" cy="512" r="78"  fill="#091540"/>

  <!-- DÖNEN OK — daha kalın yay + belirgin ok başı -->
  <!-- Yay: sağ üst (saat ~1) → sağ alt (saat ~5), saat yönü, r=268 -->
  <path d="M 740 290 A 268 268 0 0 1 762 740"
        fill="none" stroke="#22d3ee" stroke-width="44" stroke-linecap="round"/>
  <!-- Ok başı: büyük, keskin üçgen -->
  <polygon points="0,-34  30,22  -30,22"
           fill="#22d3ee"
           transform="translate(762,740) rotate(148)"/>

  <!-- SL harfleri — büyük, net -->
  <text x="482" y="558"
    font-family="DejaVu Sans, Arial, sans-serif"
    font-weight="900" font-size="96"
    fill="#22d3ee" text-anchor="middle">S</text>
  <text x="546" y="558"
    font-family="DejaVu Sans, Arial, sans-serif"
    font-weight="900" font-size="96"
    fill="#bfdbfe" text-anchor="middle">L</text>

</svg>
